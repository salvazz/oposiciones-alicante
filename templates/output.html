<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Opportunities</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 20px;
            color: #333;
        }
        header {
            background: #0044cc;
            color: #fff;
            padding: 10px 20px;
            text-align: center;
        }
        .job-listings {
            margin: 20px 0;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
        }
        .job-listing {
            border-bottom: 1px solid #ccc;
            padding: 10px 0;
        }
        .job-title {
            font-size: 1.5em;
            color: #0044cc;
        }
        .apply-button {
            background: #28a745;
            color: white;
            padding: 10px;
            text-decoration: none;
            border-radius: 5px;
        }
        .apply-button:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <header>
        <h1>Job Opportunities</h1>
    </header>
    <div class="job-listings">
        <div class="job-listing">
            <div class="job-title">Software Engineer</div>
            <p>Company: ABC Corp - Location: Remote</p>
            <p>Posted on: 2026-04-01</p>
            <a href="#" class="apply-button">Apply Now</a>
        </div>
        <div class="job-listing">
            <div class="job-title">Product Manager</div>
            <p>Company: XYZ Ltd - Location: New York</p>
            <p>Posted on: 2026-04-02</p>
            <a href="#" class="apply-button">Apply Now</a>
        </div>
    </div>
</body>
</html>
